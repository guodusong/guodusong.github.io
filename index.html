<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>新标签页</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #e8ecf1;
            --surface: #e8ecf1;
            --text-primary: #3a3f47;
            --text-secondary: #8b919a;
            --primary: #7eb8a0;
            --primary-dark: #5f9a82;
            --primary-light: #b8d8cb;
            --danger: #e07a6e;
            --danger-dark: #c96056;
            --danger-light: #f0c4bd;
            --shadow-dark: #d1d5db;
            --shadow-light: #ffffff;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 36px;
            --neu-shadow-lg: 10px 10px 20px #d1d5db, -10px -10px 20px #ffffff;
            --neu-shadow: 6px 6px 12px #d1d5db, -6px -6px 12px #ffffff;
            --neu-shadow-sm: 4px 4px 8px #d1d5db, -4px -4px 8px #ffffff;
            --neu-shadow-inset: inset 4px 4px 8px #d1d5db, inset -4px -4px 8px #ffffff;
            --neu-shadow-pressed: inset 6px 6px 12px #d1d5db, inset -6px -6px 12px #ffffff;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 24px 16px 48px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container { max-width: 960px; margin: 0 auto; }

        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--neu-shadow-lg);
            transition: var(--transition);
        }

        .hero { text-align: center; margin-bottom: 28px; }
        .hero h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: var(--bg);
            box-shadow: var(--neu-shadow-inset);
            padding: 6px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            background: transparent;
            border: none;
            font-family: inherit;
        }
        .tab.active {
            background: var(--surface);
            color: var(--primary-dark);
            box-shadow: var(--neu-shadow-sm);
            font-weight: 700;
        }
        .tab:hover:not(.active) { color: var(--text-primary); }
        .tab:active { box-shadow: var(--neu-shadow-inset); }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background: var(--bg);
            box-shadow: var(--neu-shadow-inset);
            transition: var(--transition);
            outline: none;
            font-family: inherit;
            color: var(--text-primary);
        }
        .input-field::placeholder { color: #b0b8c1; }
        .input-field:focus {
            box-shadow: var(--neu-shadow-pressed), 0 0 0 3px rgba(126, 184, 160, 0.25);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 22px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            background: var(--surface);
            color: var(--text-primary);
            box-shadow: var(--neu-shadow-sm);
            white-space: nowrap;
        }
        .btn:hover:not(:disabled) {
            box-shadow: var(--neu-shadow);
            transform: translateY(-1px);
        }
        .btn:active:not(:disabled) {
            box-shadow: var(--neu-shadow-inset);
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 4px 4px 8px #c7d6cf, -4px -4px 8px #ffffff;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            box-shadow: 6px 6px 12px #c7d6cf, -6px -6px 12px #ffffff;
        }
        .btn-primary:active:not(:disabled) {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.15), inset -2px -2px 4px rgba(255,255,255,0.3);
            background: var(--primary-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            box-shadow: 4px 4px 8px #dcc3bf, -4px -4px 8px #ffffff;
        }
        .btn-danger:hover:not(:disabled) {
            background: var(--danger-dark);
            box-shadow: 6px 6px 12px #dcc3bf, -6px -6px 12px #ffffff;
        }
        .btn-danger:active:not(:disabled) {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.15), inset -2px -2px 4px rgba(255,255,255,0.3);
            background: var(--danger-dark);
        }

        .btn-ghost { background: var(--surface); color: var(--text-primary); }
        .btn-sm { padding: 7px 14px; font-size: 0.78rem; border-radius: 8px; }
        .w-full { width: 100%; }

        .flex-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            background: var(--surface);
            padding: 20px 16px;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--neu-shadow-sm);
            transition: var(--transition);
        }
        .stat-card:hover { box-shadow: var(--neu-shadow); transform: translateY(-2px); }
        .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); }
        .stat-label { font-size: 0.72rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .stat-card.danger-card .stat-num { color: var(--danger); }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(209, 213, 219, 0.5);
        }
        .section-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius-md);
            box-shadow: var(--neu-shadow-inset);
            margin-bottom: 16px;
        }
        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--shadow-dark);
            margin: 0 4px;
            align-self: center;
        }

        .table-wrapper {
            overflow-x: auto;
            margin: 16px 0;
            border-radius: var(--radius-md);
            background: var(--surface);
            box-shadow: var(--neu-shadow);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 740px; }
        th, td { padding: 12px 10px; text-align: left; vertical-align: middle; }
        th {
            background: var(--bg);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--shadow-dark);
        }
        td { border-bottom: 1px solid rgba(209, 213, 219, 0.4); color: var(--text-primary); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(126, 184, 160, 0.06); }
        .token-name { color: var(--primary-dark); font-weight: 600; cursor: pointer; transition: color 0.15s; }
        .token-name:hover { color: var(--primary); }
        .remain-value { color: var(--primary-dark); font-weight: 600; }
        .used-value { color: var(--danger); font-weight: 600; }
        .action-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .action-group .btn { font-size: 0.72rem; padding: 5px 10px; }

        .code-section { margin-top: 14px; }
        .code-label { font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .code-box {
            background: #2d3239;
            color: #b8d8cb;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
            font-size: 0.73rem;
            white-space: pre-wrap;
            word-break: break-all;
            box-shadow: var(--neu-shadow-inset);
        }
        .copy-btn-sm {
            background: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            margin-top: 8px;
            width: 100%;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            box-shadow: var(--neu-shadow-sm);
            transition: var(--transition);
        }
        .copy-btn-sm:hover { box-shadow: var(--neu-shadow); transform: translateY(-1px); }
        .copy-btn-sm:active { box-shadow: var(--neu-shadow-inset); transform: translateY(0); }

        .log-list {
            max-height: 400px;
            overflow-y: auto;
            background: var(--bg);
            border-radius: var(--radius-md);
            padding: 12px;
            box-shadow: var(--neu-shadow-inset);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .log-list:empty::before { content: "暂无日志"; display: block; text-align: center; padding: 20px; color: var(--text-secondary); font-size: 0.85rem; }

        .tip-box {
            margin-top: 20px;
            padding: 14px 18px;
            background: var(--bg);
            border-radius: var(--radius-md);
            box-shadow: var(--neu-shadow-inset);
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .toast-stack { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column-reverse; gap: 10px; pointer-events: none; }
        .toast-item {
            padding: 12px 20px;
            background: var(--surface);
            border-radius: var(--radius-md);
            box-shadow: var(--neu-shadow-lg);
            font-weight: 600;
            font-size: 0.85rem;
            animation: toastIn 0.3s ease-out;
            pointer-events: auto;
            color: var(--text-primary);
        }
        .toast-item.toast-error { color: var(--danger); }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .import-panel { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease; margin-top: 0; }
        .import-panel.show { max-height: 260px; opacity: 1; margin-top: 12px; }

        .progress-bar { width: 100%; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 12px; box-shadow: var(--neu-shadow-inset); }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(58, 63, 71, 0.45);
            backdrop-filter: blur(4px);
            z-index: 10002;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            max-width: 600px;
            width: 92%;
            max-height: 82vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: var(--neu-shadow-lg);
            animation: modalSlideIn 0.25s ease-out;
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.94) translateY(-12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 18px; color: var(--text-primary); }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); font-size: 0.85rem; }
        .modal textarea.input-field { resize: vertical; min-height: 80px; }
        .modal .btn-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }

        .rename-panel {
            margin-top: 14px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius-md);
            box-shadow: var(--neu-shadow-inset);
        }
        .rename-panel .flex-row { gap: 8px; }

        .pagination-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin: 20px 0;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .original-token { color: var(--text-secondary); font-size: 0.82rem; }

        .login-box {
            background: var(--bg);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--neu-shadow-inset);
            margin-bottom: 20px;
        }

        .question-stats-modal-card { max-width: 860px; width: min(94vw, 860px); padding: 0; overflow: hidden; border-radius: var(--radius-lg); }
        .question-stats-header {
            display: flex; justify-content: space-between; align-items: center; gap: 16px;
            padding: 20px 24px; background: var(--bg);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            box-shadow: inset 0 -2px 4px rgba(209,213,219,0.3);
        }
        .question-stats-title { display: flex; flex-direction: column; gap: 4px; }
        .question-stats-title h3 { margin: 0; font-size: 1.15rem; color: var(--text-primary); }
        .question-stats-title p { margin: 0; font-size: 0.82rem; color: var(--text-secondary); }
        .question-stats-body { padding: 22px 24px 24px; background: var(--surface); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
        .stats-card { border-radius: var(--radius-md); padding: 16px; background: var(--bg); box-shadow: var(--neu-shadow-sm); }
        .stats-card-label { font-size: 0.73rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
        .stats-card-value { font-size: 1.35rem; font-weight: 800; color: var(--primary-dark); line-height: 1.2; word-break: break-word; }
        .stats-card-sub { margin-top: 6px; font-size: 0.76rem; color: var(--text-secondary); }
        .stats-section { background: var(--bg); border-radius: var(--radius-md); padding: 16px; margin-top: 14px; box-shadow: var(--neu-shadow-inset); }
        .stats-section-title { font-size: 0.88rem; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
        .stats-history-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow: auto; padding-right: 4px; }
        .stats-history-item {
            display: grid; grid-template-columns: 170px 1fr auto; gap: 10px; align-items: center;
            padding: 12px 14px; border-radius: var(--radius-sm);
            background: var(--surface); box-shadow: var(--neu-shadow-sm);
        }
        .stats-history-time { font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; color: var(--text-secondary); }
        .stats-history-category { font-weight: 700; color: var(--primary-dark); word-break: break-word; }
        .stats-history-count {
            justify-self: end; font-size: 0.78rem; font-weight: 700; color: var(--primary-dark);
            background: var(--bg); padding: 4px 10px; border-radius: 999px; white-space: nowrap;
            box-shadow: var(--neu-shadow-sm);
        }
        .stats-empty { padding: 20px; text-align: center; color: var(--text-secondary); font-size: 0.88rem; }
        .close-history { float: right; cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 0 8px; color: var(--text-secondary); }
        .close-history:hover { color: var(--danger); }

        @media (max-width: 760px) {
            body { padding: 12px 10px 40px; }
            .card { padding: 18px 14px; }
            .grid-2 { grid-template-columns: 1fr; }
            .stat-grid { gap: 10px; }
            .stat-card { padding: 14px 10px; }
            .stat-num { font-size: 1.3rem; }
            th, td { padding: 8px 6px; font-size: 0.72rem; }
            .action-group .btn { font-size: 0.68rem; padding: 4px 6px; }
            .modal-card { padding: 18px 14px; }
            .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .stats-history-item { grid-template-columns: 1fr; gap: 6px; }
            .stats-history-count { justify-self: start; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-divider { width: 100%; height: 1px; margin: 4px 0; }
            .container { max-width: 100%; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>

</head>
<body>
<div class="toast-stack" id="toastStack"></div>
<div class="container">
    <div class="hero">
        <h1 id="mainTitle">🎄链接生成器</h1>
    </div>

    <div class="tabs">
        <button class="tab active" id="userTabBtn">链接提取</button>
        <button class="tab" id="adminTabBtn">管理终端</button>
    </div>

    <div id="userPanel" class="card" style="display: block;">
        <div class="input-group">
            <input type="text" id="tokenInput" class="input-field" placeholder="请输入提取码" autocomplete="off">
        </div>
        <button id="verifyBtn" class="btn btn-primary w-full" style="margin-top: 8px;">验证并生成</button>
        <div id="resultArea" style="display: none; margin-top: 20px;"></div>
        <div class="tip-box">
            🎋提示：生成的代码复制后，进入答题页面，粘贴到地址栏，删掉最前方的等号 "="，回车。
        </div>
    </div>

    <div id="adminPanel" class="card" style="display: none;">
        <div id="adminLoginArea">
            <div class="flex-row" style="margin-bottom: 20px;">
                <input type="password" id="adminPassword" class="input-field" placeholder="请输入密码" style="flex:2;">
                <button id="loginAdminBtn" class="btn btn-primary" style="flex:1;">登录</button>
            </div>
        </div>
        <div id="adminMainArea" style="display: none;">
            <div class="stat-grid">
                <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总数</div></div>
                <div class="stat-card"><div class="stat-num" id="statActive">0</div><div class="stat-label">活跃</div></div>
                <div class="stat-card danger-card"><div class="stat-num" id="statUsed">0</div><div class="stat-label">耗尽</div></div>
            </div>

            <div style="background: var(--bg); border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px; box-shadow: var(--neu-shadow-inset);">
                <div class="flex-between" style="margin-bottom: 16px;">
                    <span style="font-weight: 700;">Token 管理</span>
                </div>
                <div class="grid-2" style="margin-bottom: 16px;">
                    <button id="queryTokenBtn" class="btn btn-primary">查询全部</button>
                    <button id="clearAllBtn" class="btn btn-danger">清空全部</button>
                </div>
                <div class="flex-row" style="margin-bottom: 16px;">
                    <input type="text" id="newTokenName" class="input-field" placeholder="新 Token 名称" style="flex:2;">
                    <input type="number" id="newTokenInitCount" class="input-field" placeholder="初始次数" value="3" style="flex:1; text-align:center;">
                    <button id="addTokenBtn" class="btn btn-primary">添加</button>
                </div>
                <div class="flex-row">
                    <button id="deleteSelectedBtn" class="btn btn-danger">删除选中</button>
                    <button id="refreshDataBtn" class="btn btn-ghost">刷新数据</button>
                    <button id="toggleImportBtn" class="btn btn-ghost">批量导入</button>
                </div>
                <div id="importPanel" class="import-panel">
                    <textarea id="importTokensText" rows="3" class="input-field" placeholder="每行一个 Token，默认初始次数3"></textarea>
                    <button id="confirmImportBtn" class="btn btn-primary w-full" style="margin-top: 10px;">确认导入</button>
                </div>
            </div>

            <div class="flex-between" style="margin-bottom: 12px;">
                <span style="font-weight: 700;">Token 清单</span>
                <div>
                    <button id="filterRemainBtn" class="btn btn-ghost btn-sm">筛选剩余次数</button>
                    <button id="clearFilterBtn" class="btn btn-ghost btn-sm">清除筛选</button>
                </div>
            </div>
            <div id="tokenTableContainer"></div>
            <div id="paginationContainer" style="display: flex; justify-content: center; margin: 20px 0;"></div>

            <div class="flex-between" style="margin-bottom: 10px;">
                <span style="font-weight: 700;">用户日志</span>
                <button id="clearLogsBtn" class="btn btn-danger btn-sm">清空日志</button>
            </div>
            <div id="logsContainer" class="log-list"></div>

            <div style="margin-top: 24px;">
                <div style="font-weight: 700; margin-bottom: 8px;">免 Token</div>
                <div class="code-section">
                    <div class="code-box" id="emergencyCodeBlock"></div>
                    <button id="copyEmergencyBtn" class="copy-btn-sm">复制代码</button>
                </div>
            </div>

            <div style="margin-top: 32px; border-top: 2px solid rgba(209,213,219,0.5); padding-top: 24px;">
                <div class="flex-between" style="margin-bottom: 16px;">
                    <span style="font-weight: 700;">题库管理</span>
                    <div class="flex-row" style="gap: 8px;">

<script>
    // ═══════════════════════════════════════════════════════════
    //  配置与全局状态
    // ═══════════════════════════════════════════════════════════
    const API_URL = 'https://1416699676-d1k7hq7ak8.ap-beijing.tencentscf.com';

    // 题目状态
    let filteredQuestions = [];
    let currentQuestionPage = 1;
    const QUESTION_PAGE_SIZE = 10;
    let questionStatsTotal = 0;
    let currentEditId = null;

    // Token 管理状态
    let adminPassword = '';
    let currentTokens = [];
    let filteredTokens = [];
    let currentPage = 1;
    const PAGE_SIZE = 15;
    let remainFilterValue = null;
    let selectedTokens = new Set();

    // 日志状态
    let logPage = 1;
    let logHasMore = true;
    let logLoading = false;
    const LOG_PAGE_SIZE = 10;

    // Excel 导入状态
    let currentExcelData = null;
    let currentExcelHeaders = [];
    let currentImportCategory = '';

    // 彩蛋状态
    let clickCount = 0;
    let clickTimer = null;

    // ═══════════════════════════════════════════════════════════
    //  工具函数
    // ═══════════════════════════════════════════════════════════

    function showToast(msg, isError = false) {
        const stack = document.getElementById('toastStack');
        const toast = document.createElement('div');
        toast.className = 'toast-item';
        if (isError) toast.classList.add('toast-error');
        toast.innerText = msg;
        stack.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'toastIn 0.2s reverse';
            setTimeout(() => toast.remove(), 250);
        }, 2800);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function copyToClipboard(text, btn) {
        const successVisual = () => {
            const original = btn.innerText;
            const originalBg = btn.style.background;
            btn.innerText = '已复制 ✓';
            btn.style.background = 'var(--primary-dark)';
            showToast('代码已复制');
            setTimeout(() => { 
                btn.innerText = original; 
                btn.style.background = originalBg;
            }, 1500);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(successVisual).catch(() => fallbackCopy(text, successVisual));
        } else {
            fallbackCopy(text, successVisual);
        }
    }

    window.copyTokenText = function(text, el) {
        const successVisual = () => {
            const originalColor = el.style.color;
            el.style.color = '#059669';
            showToast(`Token [${text}] 已复制`);
            setTimeout(() => { el.style.color = originalColor; }, 800);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(successVisual).catch(() => fallbackCopy(text, successVisual));
        } else {
            fallbackCopy(text, successVisual);
        }
    }

    function fallbackCopy(text, successCallback) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.top = '-1000px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            if (document.execCommand('copy')) successCallback();
            else showToast('复制失败，请手动选择复制', true);
        } catch (err) {
            showToast('复制失败，请手动选择复制', true);
        } finally {
            document.body.removeChild(textarea);
        }
    }

    window.addEventListener('error', (event) => {
        console.error('[页面错误]', event.error || event.message || event);
    });

    const titleElement = document.getElementById('mainTitle');
    titleElement.addEventListener('click', async () => {
        clickCount++;
        if (clickTimer) clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        if (clickCount >= 7) {
            clickCount = 0;
            try {
                const res = await fetch(`${API_URL}?action=getHiddenUrl`);
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    showToast('隐藏地址无效', true);
                }
            } catch(e) {
                showToast('获取隐藏地址失败', true);
            }
        }
    });

    async function renameUserToken(oldToken, newToken) {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'renameToken', token: oldToken, newToken: newToken })
        });
        return await res.json();
    }

    // ═══════════════════════════════════════════════════════════
    //  用户端逻辑
    // ═══════════════════════════════════════════════════════════
    async function userVerify() {
        const token = document.getElementById('tokenInput').value.trim();
        if (!token) { showToast('请输入 Token', true); return; }
        const btn = document.getElementById('verifyBtn');
        const originalText = btn.innerText;
        btn.innerText = '验证中...';
        btn.disabled = true;
        try {
            const res = await fetch(`${API_URL}?token=${encodeURIComponent(token)}&check=1`);
            if (!res.ok) {
                const text = await res.text();
                let errMsg = '验证失败';
                try { errMsg = JSON.parse(text).error || errMsg; } catch(e) {}
                throw new Error(errMsg);
            }
            const data = await res.json();
            const area = document.getElementById('resultArea');
            if (data.valid === false && data.reason === 'not_found') {
                showToast('Token 不存在', true);
                area.style.display = 'none';
                return;
            }
            if (data.valid === false && data.reason === 'no_remain') {
                area.style.display = 'block';
                area.innerHTML = '<div class="flex-between" style="margin-bottom:14px;"><div style="font-size:0.9rem; font-weight:600; color:var(--primary-dark);">验证通过，剩余次数：<strong style="font-size:1.1rem;">0</strong></div><button class="btn btn-ghost btn-sm" id="toggleRenameBtn">✎ 修改令牌</button></div><div class="rename-panel" id="renamePanel" style="display:none;"><div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:8px;">输入新的令牌名称：</div><div class="flex-row"><input type="text" id="newTokenNameInput" class="input-field" placeholder="新令牌名称" style="flex:2;"><button class="btn btn-primary btn-sm" id="confirmRenameBtn">确认</button><button class="btn btn-ghost btn-sm" id="cancelRenameBtn">取消</button></div><div id="renameMsg" style="margin-top:6px; font-size:0.78rem;"></div></div><div class="tip-box">链接已失效，无法生成代码。</div>';
                showToast('验证通过，但次数已用完');
                return;
            }
            if (data.valid) {
                const c1 = `=javascript:$.getScript('${API_URL}?token=${token}')`;
                const c2 = `=javascript:(function(){var s=document.createElement('script');s.src='${API_URL}?token=${token}';document.body.appendChild(s);})();`;
                area.style.display = 'block';
                area.innerHTML = `
                    <div class="flex-between" style="margin-bottom:14px;">
                        <div style="font-size:0.9rem; font-weight:600; color:var(--primary-dark);">验证通过，剩余次数：<strong style="font-size:1.1rem;">${data.remain}</strong></div>
                        <button class="btn btn-ghost btn-sm" id="toggleRenameBtn">✎ 修改令牌</button>
                    </div>
                    <div class="rename-panel" id="renamePanel" style="display:none;">
                        <div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:8px;">输入新的令牌名称：</div>
                        <div class="flex-row">
                            <input type="text" id="newTokenNameInput" class="input-field" placeholder="新令牌名称" style="flex:2;">
                            <button class="btn btn-primary btn-sm" id="confirmRenameBtn">确认</button>
                            <button class="btn btn-ghost btn-sm" id="cancelRenameBtn">取消</button>
                        </div>
                        <div id="renameMsg" style="margin-top:6px; font-size:0.78rem;"></div>
                    </div>
                    <div class="code-section">
                        <div class="code-label">方式一（首选）</div>
                        <div class="code-box">${escapeHtml(c1)}</div>
                        <button class="copy-btn-sm" data-code="${escapeHtml(c1)}">复制代码</button>
                    </div>
                    <div class="code-section" style="margin-top:12px;">
                        <div class="code-label">方式二（备用）</div>
                        <div class="code-box">${escapeHtml(c2)}</div>
                        <button class="copy-btn-sm" data-code="${escapeHtml(c2)}">复制代码</button>
                    </div>
                `;
                document.querySelectorAll('#resultArea .copy-btn-sm').forEach(btn2 => {
                    const code = btn2.getAttribute('data-code');
                    btn2.addEventListener('click', () => copyToClipboard(code, btn2));
                });
                // 改名面板交互
                let currentVerifiedToken = token;
                document.getElementById('toggleRenameBtn').addEventListener('click', () => {
                    const panel = document.getElementById('renamePanel');
                    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
                });
                document.getElementById('cancelRenameBtn').addEventListener('click', () => {
                    document.getElementById('renamePanel').style.display = 'none';
                    document.getElementById('newTokenNameInput').value = '';
                    document.getElementById('renameMsg').innerHTML = '';
                });
                document.getElementById('confirmRenameBtn').addEventListener('click', async () => {
                    const newName = document.getElementById('newTokenNameInput').value.trim();
                    const msgEl = document.getElementById('renameMsg');
                    if (!newName) { msgEl.innerHTML = '<span style=\"color:var(--danger);\">请输入新名称</span>'; return; }
                    if (newName === currentVerifiedToken) { msgEl.innerHTML = '<span style=\"color:var(--danger);\">新名称不能与当前名称相同</span>'; return; }
                    const btn = document.getElementById('confirmRenameBtn');
                    btn.disabled = true; btn.innerText = '改名中...';
                    try {
                        const result = await renameUserToken(currentVerifiedToken, newName);
                        if (result.error) throw new Error(result.error);
                        currentVerifiedToken = newName;
                        document.getElementById('tokenInput').value = newName;
                        document.getElementById('renamePanel').style.display = 'none';
                        document.getElementById('newTokenNameInput').value = '';
                        msgEl.innerHTML = '<span style=\"color:var(--primary-dark);\">改名成功！新令牌：<strong>' + escapeHtml(newName) + '</strong></span>';
                        // 刷新代码块
                        const nc1 = '=javascript:$.getScript(\'' + API_URL + '?token=' + encodeURIComponent(newName) + '\')';
                        const nc2 = '=javascript:(function(){var s=document.createElement(\'script\');s.src=\'' + API_URL + '?token=' + encodeURIComponent(newName) + '\';document.body.appendChild(s);})();';
                        document.querySelectorAll('#resultArea .code-box')[0].innerText = nc1;
                        document.querySelectorAll('#resultArea .code-box')[1].innerText = nc2;
                        document.querySelectorAll('#resultArea .copy-btn-sm')[0].setAttribute('data-code', nc1);
                        document.querySelectorAll('#resultArea .copy-btn-sm')[1].setAttribute('data-code', nc2);
                        showToast('令牌已更名为：' + newName);
                    } catch(e) {
                        msgEl.innerHTML = '<span style=\"color:var(--danger);\">' + escapeHtml(e.message) + '</span>';
                    } finally {
                        btn.disabled = false; btn.innerText = '确认';
                    }
                });
                showToast('验证通过');
            } else {
                area.style.display = 'block';
                area.innerHTML = '<div class=\"rename-panel\" style=\"text-align:center;color:var(--danger);\">验证码无效</div>';
                showToast('无效的 Token', true);
            }
        } catch(e) {
            showToast(e.message || '验证失败，请重试', true);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // ═══════════════════════════════════════════════════════════
    //  管理端 API 封装
    // ═══════════════════════════════════════════════════════════
    async function adminFetch(action, params = {}) {
        const payload = { admin: '1', action: action, password: adminPassword, ...params };
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!res.ok) {
            const text = await res.text();
            let errMessage = '请求失败';
            try { const parsed = JSON.parse(text); if (parsed.error) errMessage = parsed.error; } catch(e) {}
            if (errMessage === '密码错误') {
                adminPassword = '';
                document.getElementById('adminLoginArea').style.display = 'block';
                document.getElementById('adminMainArea').style.display = 'none';
                showToast('登录已过期，请重新登录', true);
                throw new Error('密码错误');
            }
            throw new Error(errMessage);
        }
        return await res.json();
    }

    // ═══════════════════════════════════════════════════════════
    //  Token 管理（列表/统计/筛选/增删改查）
    // ═══════════════════════════════════════════════════════════
    async function loadAllTokens() {
        const container = document.getElementById('tokenTableContainer');
        container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-secondary);">加载中...</div>';
        try {
            const data = await adminFetch('listAll');
            currentTokens = data.tokens || [];
            updateStats();
            applyFilters();
            await loadLogs();
        } catch (err) {
            container.innerHTML = `<div style="color:var(--danger);">加载失败: ${err.message}</div>`;
            showToast(`加载Token失败: ${err.message}`, true);
        }
    }

    function updateStats() {
        document.getElementById('statTotal').innerText = currentTokens.length;
        document.getElementById('statActive').innerText = currentTokens.filter(t => t.remain > 0).length;
        document.getElementById('statUsed').innerText = currentTokens.filter(t => t.remain <= 0).length;
    }

    function applyFilters() {
        let filtered = [...currentTokens];
        if (remainFilterValue !== null) filtered = filtered.filter(t => t.remain === remainFilterValue);
        filteredTokens = filtered;
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const container = document.getElementById('tokenTableContainer');
        if (!filteredTokens.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-secondary);">暂无数据，请点击"查询全部"</div>';
            document.getElementById('paginationContainer').innerHTML = '';
            return;
        }
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageItems = filteredTokens.slice(start, start + PAGE_SIZE);
        const totalPages = Math.ceil(filteredTokens.length / PAGE_SIZE);

        let html = '<div class="table-wrapper"><table><thead><tr><th style="width:36px;"><input type="checkbox" id="selectAllCheck"></th><th>原Token</th><th>现Token</th><th>初始</th><th>剩余</th><th>已用</th><th>操作</th></tr></thead><tbody>';
        pageItems.forEach(t => {
            const hasRenamed = t.originalToken && t.originalToken !== t.token;
            html += `
                <tr data-token="${escapeHtml(t.token)}">
                    <td><input type="checkbox" class="tokenCheck" value="${escapeHtml(t.token)}" ${selectedTokens.has(t.token) ? 'checked' : ''}></td>
                    <td class="original-token">${escapeHtml(hasRenamed ? t.originalToken : t.token)}</td>
                    <td class="token-name" title="点击复制" onclick="copyTokenText('${escapeHtml(t.token)}', this)"><span style="border-bottom: 1px dashed var(--primary-dark);">${escapeHtml(t.token)}</span></td>
                    <td>${t.initCount}</td>
                    <td class="remain-value">${t.remain}</td>
                    <td class="used-value">${t.used}</td>
                    <td class="action-group">
                        <button class="btn btn-ghost btn-sm edit-btn" data-token="${escapeHtml(t.token)}">修改</button>
                        <button class="btn btn-ghost btn-sm rename-btn" data-token="${escapeHtml(t.token)}">改名</button>
                        <button class="btn btn-ghost btn-sm reset-btn" data-token="${escapeHtml(t.token)}">重置</button>
                        <button class="btn btn-danger btn-sm delete-btn" data-token="${escapeHtml(t.token)}">删除</button>
                    </td>
                </tr>
            `;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;

        const paginationDiv = document.getElementById('paginationContainer');
        paginationDiv.innerHTML = `
            <div class="pagination-bar">
                <button class="btn btn-ghost btn-sm" id="prevPageBtn" ${currentPage===1 ? 'disabled' : ''}>上一页</button>
                <span>${currentPage} / ${totalPages}</span>
                <button class="btn btn-ghost btn-sm" id="nextPageBtn" ${currentPage===totalPages ? 'disabled' : ''}>下一页</button>
            </div>
        `;

        const selectAll = document.getElementById('selectAllCheck');
        if (selectAll) selectAll.onchange = (e) => {
            document.querySelectorAll('.tokenCheck').forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) selectedTokens.add(cb.value);
                else selectedTokens.delete(cb.value);
            });
        };
        document.querySelectorAll('.tokenCheck').forEach(cb => {
            cb.onchange = (e) => {
                if (e.target.checked) selectedTokens.add(e.target.value);
                else selectedTokens.delete(e.target.value);
                if (selectAll) selectAll.checked = document.querySelectorAll('.tokenCheck:checked').length === document.querySelectorAll('.tokenCheck').length;
            };
        });

        const tableBody = container.querySelector('tbody');
        if (tableBody) {
            tableBody.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', handleEdit));
            tableBody.querySelectorAll('.rename-btn').forEach(btn => btn.addEventListener('click', handleRename));
            tableBody.querySelectorAll('.reset-btn').forEach(btn => btn.addEventListener('click', handleReset));
            tableBody.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', handleDelete));
        }

        document.getElementById('prevPageBtn')?.addEventListener('click', () => { if(currentPage>1) { currentPage--; renderTable(); } });
        document.getElementById('nextPageBtn')?.addEventListener('click', () => { if(currentPage<totalPages) { currentPage++; renderTable(); } });
    }

    async function handleEdit(e) {
        const token = e.currentTarget.getAttribute('data-token');
        const newVal = prompt('请输入新的剩余次数:');
        if (newVal === null) return;
        const num = parseInt(newVal);
        if (isNaN(num)) { showToast('请输入数字', true); return; }
        try {
            await adminFetch('updateRemain', { token, newRemain: num });
            await loadAllTokens();
            showToast('修改成功');
        } catch(err) { showToast(`修改失败: ${err.message}`, true); }
    }

    async function handleRename(e) {
        const oldToken = e.currentTarget.getAttribute('data-token');
        const newToken = prompt('请输入新 Token 名称：', oldToken);
        if (!newToken || newToken.trim() === oldToken) return;
        try {
            const res = await adminFetch('renameToken', { token: oldToken, newToken: newToken.trim() });
            if (res.error) throw new Error(res.error);
            showToast(`已将 "${oldToken}" 改名为 "${newToken.trim()}"`);

    function renderLogEntry(log) {
        const date = new Date(log.timestamp);
        const timeString = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
        const adminActions = ['login', 'add', 'updateRemain', 'reset', 'renameToken', 'delete', 'deleteBatch', 'clearAll', 'import', 'importSimpleQuestions', 'updateSimpleQuestion', 'deleteSimpleQuestion', 'clearAllQuestions'];

        const identityText = isIdentityAdmin ? '管理员' : `用户 (${escapeHtml(log.token || '未知')})`;
        let actionText = '';
        if (log.action === 'use') {
            const remainStr = log.details ? log.details.replace(/[^0-9]/g, '') : '0';
            actionText = `提取脚本 (剩余次数 ${remainStr})`;
        } else if (log.action === 'add') {
            actionText = `添加了 Token "${escapeHtml(log.token)}" ${log.details ? '(' + escapeHtml(log.details) + ')' : ''}`;
        } else if (log.action === 'updateRemain') {
            actionText = `修改了 Token "${escapeHtml(log.token)}" 的${escapeHtml(log.details || '剩余次数')}`;
        } else if (log.action === 'reset') {
            actionText = `将 Token "${escapeHtml(log.token)}" 的${escapeHtml(log.details || '剩余次数恢复')}`;
        } else if (log.action === 'renameToken') {
            actionText = `将 Token 改名 (${escapeHtml(log.details || '')})`;
        } else if (log.action === 'delete') {
            actionText = `删除了 Token "${escapeHtml(log.token)}"`;
        } else if (log.action === 'deleteBatch') {
            actionText = `批量删除 (${escapeHtml(log.details || '')})`;
        } else if (log.action === 'clearAll') {
            actionText = `清空了全站所有 Token`;
        } else if (log.action === 'import') {
            actionText = `批量导入 Token (${escapeHtml(log.details || '')})`;
        } else if (log.action === 'importSimpleQuestions') {
            actionText = `导入题库 (新增 ${log.details?.match(/\d+/)?.[0] || '?'} 条)`;
        } else if (log.action === 'updateSimpleQuestion') {
            actionText = `修改题目 ${log.details || ''}`;
        } else if (log.action === 'deleteSimpleQuestion') {
            actionText = `删除题目 ${log.details || ''}`;
        } else if (log.action === 'clearAllQuestions') {
            actionText = `清空题库 (${log.details?.match(/\d+/)?.[0] || '?'} 条)`;
        } else if (log.action === 'login') {
            actionText = `登录管理面板`;
        } else {
            actionText = `${log.action || ''} ${log.details || ''}`;
        }
        const div = document.createElement('div');
        div.style.cssText = "display: flex; flex-direction: column; gap: 8px; padding: 12px 16px; background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px rgba(0,0,0,0.02); margin-bottom: 8px;";
        div.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 12px;">[${timeString}]</span>
                <span style="padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; ${badgeStyle}">${identityText}</span>
            </div>

                <span style="color: var(--primary-dark); background: rgba(126,184,160,0.12); padding: 2px 8px; border-radius: 6px; font-size: 11px; font-family: 'JetBrains Mono', monospace;">
                    ${escapeHtml(log.ip || '未知IP')}

                <span style="color: var(--text-secondary); background: var(--bg); padding: 2px 8px; border-radius: 6px; font-size: 11px; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(log.location || '未知属地')}">

    // reset=true 清空重新加载，reset=false 追加下一页
    async function loadLogs(reset = true) {
        const container = document.getElementById('logsContainer');
        if (!container || logLoading) return;
        if (reset) {
            logPage = 1;
            logHasMore = true;
            container.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text-secondary);">加载中...</div>';
            container._logScrollSetup = false;
        }
        if (!logHasMore) return;
        logLoading = true;
        try {
            const data = await adminFetch('logs', { page: logPage, pageSize: LOG_PAGE_SIZE });
            const rawLogs = data.logs || [];
            logHasMore = data.hasMore !== false && rawLogs.length >= LOG_PAGE_SIZE;
            if (reset) container.innerHTML = '';
            if (rawLogs.length === 0 && reset) {
                container.innerHTML = '';
                return;
            }
            for (const logStr of rawLogs) {
                try {
                    const log = JSON.parse(logStr);
                    if (log && log.timestamp) container.appendChild(renderLogEntry(log));
                } catch(e) {}
            }
            logPage++;
            // 首次加载后设置滚动监听
            if (!container._logScrollSetup) {
                container._logScrollSetup = true;
                container.addEventListener('scroll', () => {
                    if (container.scrollHeight - container.scrollTop - container.clientHeight < 60) {
                        loadLogs(false);
                    }
                });
            }
        } catch(e) {
            if (reset) container.innerHTML = '<div style="color:var(--danger);padding:12px;">日志加载异常</div>';
            showToast('日志加载失败，请刷新重试', true);
        } finally {
            logLoading = false;
        }
    }

async function loadQuestionList() {
    const keyword = document.getElementById('questionSearchKeyword').value.trim();
    const data = await adminFetch('searchSimpleQuestions', {
        keyword,
        page: currentQuestionPage,
        pageSize: QUESTION_PAGE_SIZE
    });
    filteredQuestions = Array.isArray(data.data) ? data.data : [];
    questionStatsTotal = Number(data.total || 0);
    renderQuestionList();
    return data;
}

function renderQuestionList() {
    const container = document.getElementById('questionSearchResult');
    const paginationDiv = document.getElementById('questionPagination');
    const totalPages = Math.max(1, Math.ceil((questionStatsTotal || 0) / QUESTION_PAGE_SIZE));
    if (!filteredQuestions || filteredQuestions.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-secondary);">未找到题目</div>';
        paginationDiv.innerHTML = questionStatsTotal
            ? `<div style="font-weight:600; color:var(--text-secondary);">共 ${questionStatsTotal} 条，当前第 ${currentQuestionPage} 页</div>`
            : '';
        return;
    }
    let html = '<div class="table-wrapper"><table><thead><tr><th>ID</th><th>题目</th><th>选项</th><th>答案</th><th>操作</th></tr></thead><tbody>';
    for (const item of filteredQuestions) {
        const optionsDisplay = Array.isArray(item.options) ? item.options.map(opt => escapeHtml(opt)).join(' | ') : '';
        html += `
            <tr data-id="${escapeHtml(item.id)}" data-text="${escapeHtml(item.text)}" data-options='${escapeHtml(JSON.stringify(item.options || []))}' data-answer="${escapeHtml(item.answer)}">
                <td>${escapeHtml(item.id)}</td>
                <td style="max-width:300px; word-break:break-word;">${escapeHtml(item.text)}</td>
                <td style="max-width:250px; word-break:break-word;">${optionsDisplay}</td>
                <td>${escapeHtml(item.answer)}</td>
                <td class="action-group">
                    <button class="btn btn-ghost btn-sm edit-question-btn">修改</button>
                    <button class="btn btn-danger btn-sm delete-question-btn">删除</button>
                </td>
            </tr>
        `;
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;

    paginationDiv.innerHTML = `
        <div class="flex-row" style="justify-content:center; gap:12px;">
            <button class="btn btn-ghost btn-sm" id="questionPrevPage" ${currentQuestionPage===1 ? 'disabled' : ''}>上一页</button>
            <span style="font-weight:600;">${currentQuestionPage} / ${totalPages}</span>
            <button class="btn btn-ghost btn-sm" id="questionNextPage" ${currentQuestionPage===totalPages ? 'disabled' : ''}>下一页</button>
        </div>
    `;

    document.getElementById('questionPrevPage')?.addEventListener('click', async () => {
        if (currentQuestionPage > 1) {
            currentQuestionPage--;
            await loadQuestionList();
        }
    });
    document.getElementById('questionNextPage')?.addEventListener('click', async () => {
        if (currentQuestionPage < totalPages) {
            currentQuestionPage++;
            await loadQuestionList();
        }
    });

    document.querySelectorAll('.edit-question-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const row = e.target.closest('tr');
            const id = row.getAttribute('data-id');
            const text = row.getAttribute('data-text');
            const options = JSON.parse(row.getAttribute('data-options'));
            const answer = row.getAttribute('data-answer');
            openEditModal(id, text, options, answer);
        });
    });
    document.querySelectorAll('.delete-question-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            const row = e.target.closest('tr');
            const id = row.getAttribute('data-id');
            if (confirm('确定删除该题目吗？')) {
                try {
                    await adminFetch('deleteSimpleQuestion', { id });
                    showToast('删除成功');
                    await loadQuestionList();
                } catch(err) { showToast(`删除失败: ${err.message}`, true); }
            }
        });
    });
}

async function saveEdit() {
    const newText = document.getElementById('editQuestionText').value.trim();
    const newOptionsRaw = document.getElementById('editQuestionOptions').value;
    const newAnswer = document.getElementById('editQuestionAnswer').value.trim();
    if (!newText) { showToast('题目不能为空', true); return; }
    if (!newAnswer) { showToast('答案不能为空', true); return; }
    const optionsArray = newOptionsRaw.split('\n').map(s => s.trim()).filter(s => s);
    if (optionsArray.length === 0) { showToast('至少需要一个选项', true); return; }
    try {
        await adminFetch('updateSimpleQuestion', {
            id: currentEditId,
            text: newText,
            options: JSON.stringify(optionsArray),
            answer: newAnswer
        });
        showToast('修改成功');
        closeEditModal();
        await loadQuestionList();
    } catch(err) {
        showToast(`修改失败: ${err.message}`, true);
    }
}

async function clearAllQuestions() {
    if (!confirm('此操作将清空整个题库，不可恢复！确定要清空吗？')) return;
    const btn = document.getElementById('clearQuestionsBtn');
    const original = btn.innerText;

        showToast(`清空失败: ${err.message}`, true);
    } finally {
        btn.innerText = original;
        btn.disabled = false;
    }
}

async function showQuestionStatsModal() {
    const modal = document.getElementById('questionStatsModal');
    const body = document.getElementById('questionStatsBody');
    modal.style.display = 'flex';
    body.innerHTML = '<div class="stats-empty">正在加载统计数据...</div>';
    try {
        const res = await fetch(`${API_URL}?action=getImportHistory`);
        const data = await res.json();
        if (data.total === undefined || !Array.isArray(data.history)) {
            throw new Error('统计数据格式错误');
        }
        const history = [...data.history].sort((a, b) => new Date(b.time).getTime() - new Date(a.time).getTime());
        const latest = history[0] || null;
        const latestTime = latest ? new Date(latest.time) : null;
        const latestTimeText = latestTime ? `${latestTime.getFullYear()}-${String(latestTime.getMonth()+1).padStart(2,'0')}-${String(latestTime.getDate()).padStart(2,'0')} ${String(latestTime.getHours()).padStart(2,'0')}:${String(latestTime.getMinutes()).padStart(2,'0')}:${String(latestTime.getSeconds()).padStart(2,'0')}` : '暂无';
        const totalBatches = history.length;
        const totalImported = history.reduce((sum, item) => sum + (Number(item.count) || 0), 0);
        const latestCategory = latest ? (latest.category || '未命名') : '暂无';
        const latestCount = latest ? (Number(latest.count) || 0) : 0;

        const recentList = history.slice(0, 8).map(item => {
            const date = new Date(item.time);
            const timeStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
            return `
                <div class="stats-history-item">
                    <div class="stats-history-time">${timeStr}</div>
                    <div class="stats-history-category">${escapeHtml(item.category || '未命名')}</div>
                    <div class="stats-history-count">导入 ${Number(item.count) || 0} 条</div>
                </div>
            `;
        }).join('');

        body.innerHTML = `
            <div class="stats-grid">
                <div class="stats-card">
                    <div class="stats-card-label">当前题库总数</div>
                    <div class="stats-card-value">${escapeHtml(String(data.total))}</div>
                    <div class="stats-card-sub">来自题库管理统计</div>
                </div>
                <div class="stats-card">
                    <div class="stats-card-label">导入批次</div>
                    <div class="stats-card-value">${escapeHtml(String(totalBatches))}</div>
                    <div class="stats-card-sub">最近 ${Math.min(totalBatches, 8)} 条导入记录</div>
                </div>
                <div class="stats-card">
                    <div class="stats-card-label">最近导入</div>
                    <div class="stats-card-value">${escapeHtml(String(latestCount))}</div>
                    <div class="stats-card-sub">${escapeHtml(latestCategory)} · ${escapeHtml(latestTimeText)}</div>
                </div>
                <div class="stats-card">
                    <div class="stats-card-label">累计导入量</div>
                    <div class="stats-card-value">${escapeHtml(String(totalImported))}</div>
                    <div class="stats-card-sub">历史导入总题量</div>
                </div>
            </div>

            <div class="stats-section">
                <div class="stats-section-title">最近导入记录</div>
                <div class="stats-history-list">
                    ${recentList || '<div class="stats-empty">暂无导入记录</div>'}
                </div>
            </div>
        `;
    } catch (e) {
        body.innerHTML = `<div class="stats-empty">获取统计失败：${escapeHtml(e.message || '未知错误')}</div>`;
    }
}

        const previewRows = currentExcelData.slice(0, 5);
        let html = '<div style="font-weight:600; margin-bottom:8px;">预览前5行</div><div class="table-wrapper"><table style="min-width:300px;"><thead><tr><th>题目</th><th>选项列表</th><th>答案</th></tr></thead><tbody>';
        for (const row of previewRows) {
            const question = row[questionIdx] || '';
            const answer = row[answerIdx] || '';
            const options = [];
            for (let i = startIdx; i <= endIdx; i++) {
                const opt = row[i];
                if (opt && opt.toString().trim() !== '') options.push(opt.toString().trim());
            }
            const optionsStr = options.join(' | ');
            html += `<tr><td style="max-width:200px;">${escapeHtml(question)}</td><td style="max-width:200px;">${escapeHtml(optionsStr)}</td><td>${escapeHtml(answer)}</td></tr>`;
        }
        html += '</tbody></table></div>';
        document.getElementById('previewTable').innerHTML = html;
    }

    document.getElementById('questionColSelect')?.addEventListener('change', updatePreviewTable);
    document.getElementById('answerColSelect')?.addEventListener('change', updatePreviewTable);
    document.getElementById('optionStartColSelect')?.addEventListener('change', updatePreviewTable);
    document.getElementById('optionEndColSelect')?.addEventListener('change', updatePreviewTable);

    document.getElementById('addCategoryBtn')?.addEventListener('click', () => {
        const cat = prompt('请输入本次导入的题库名称（例如：客户经理题库）');
        if (cat !== null) {
            currentImportCategory = cat.trim();
            showToast(`已设置题库名称: ${currentImportCategory || '未命名'}`);
        }
    });

    async function confirmImportFromExcel() {
        const questionIdx = parseInt(document.getElementById('questionColSelect').value);
        const answerIdx = parseInt(document.getElementById('answerColSelect').value);
        const startIdx = parseInt(document.getElementById('optionStartColSelect').value);
        const endIdx = parseInt(document.getElementById('optionEndColSelect').value);
        if (isNaN(questionIdx) || isNaN(answerIdx) || isNaN(startIdx) || isNaN(endIdx) || startIdx > endIdx) {
            showToast('请正确选择列映射', true);
            return;
        }
        const questionsArray = [];
        for (const row of currentExcelData) {
            const text = row[questionIdx] ? String(row[questionIdx]).trim() : '';
            const answer = row[answerIdx] ? String(row[answerIdx]).trim() : '';
            if (!text || !answer) continue;
            const options = [];
            for (let i = startIdx; i <= endIdx; i++) {
                const opt = row[i];
                if (opt && opt.toString().trim() !== '') options.push(opt.toString().trim());
            }
            if (options.length === 0) continue;
            questionsArray.push({ text, options, answer });
        }
        if (questionsArray.length === 0) {
            showToast('没有有效的题目数据', true);
            return;
        }
        document.getElementById('excelConfigModal').style.display = 'none';
        const btn = document.getElementById('importExcelBtn');
        const progressDiv = document.getElementById('importProgress');
        const progressFill = document.getElementById('importProgressFill');
        const progressText = document.getElementById('importProgressText');
        btn.disabled = true;
        progressDiv.style.display = 'block';
        progressFill.style.width = '0%';
        progressText.innerText = `准备导入 ${questionsArray.length} 条...`;
        
        let simulatedPercent = 0;
        const interval = setInterval(() => {
            if (simulatedPercent < 90) {
                simulatedPercent += 10;
                progressFill.style.width = simulatedPercent + '%';
                progressText.innerText = `导入中 ${simulatedPercent}%...`;
            }
        }, 300);
        
        try {
            const params = { questions: JSON.stringify(questionsArray) };
            if (currentImportCategory) params.category = currentImportCategory;
            const res = await adminFetch('importSimpleQuestions', params);
            clearInterval(interval);
            progressFill.style.width = '100%';
            progressText.innerText = `导入完成！新增 ${res.added} 条`;
            showToast(`导入完成: 新增 ${res.added} 条`);
            await loadQuestionList();
            currentImportCategory = '';
        } catch (err) {
            clearInterval(interval);
            showToast(`导入失败: ${err.message}`, true);
            progressDiv.style.display = 'none';
        } finally {
            setTimeout(() => { progressDiv.style.display = 'none'; }, 2000);
            btn.disabled = false;
        }
    }

    function importExcel() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx, .xls, .csv';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
            if (!rows || rows.length < 2) { showToast('Excel 至少需要两行数据', true); return; }
            const headers = rows[0].map(h => String(h || '').trim());
            const dataRows = rows.slice(1).filter(row => row.some(cell => cell && cell.toString().trim() !== ''));
            showExcelConfigModal(dataRows, headers);
        };
        input.click();
    }

    // ═══════════════════════════════════════════════════════════
    //  事件绑定
    // ═══════════════════════════════════════════════════════════
    document.getElementById('loginAdminBtn').addEventListener('click', async () => {
        const pwd = document.getElementById('adminPassword').value;
        if (!pwd) { showToast('请输入密码', true); return; }
        const btn = document.getElementById('loginAdminBtn');
        const original = btn.innerText;
        btn.innerText = '解锁中...';
        btn.disabled = true;
        adminPassword = pwd;
        try {
            const loginResult = await adminFetch('login');
            // 立即显示管理界面和 Token 数据
            document.getElementById('adminLoginArea').style.display = 'none';
            document.getElementById('adminMainArea').style.display = 'block';
            currentTokens = loginResult.tokens || [];
            updateStats();
            applyFilters();
            showToast('管理后台已解锁');
            // 以下三项并行加载，互不阻塞
            // 1. 应急代码
            adminFetch('getEmergencyCode').then(data => {
                document.getElementById('emergencyCodeBlock').innerText = data?.code ? data.code : '应急代码获取失败';
            }).catch(() => {
                document.getElementById('emergencyCodeBlock').innerText = '应急代码加载失败';
            });
            // 2. 用户日志
            loadLogs().catch(() => {});
            // 3. 题库全量缓存（首次自动加载）
            loadQuestionList().catch(() => {});
        } catch(e) {
            if(e.message && e.message.includes('锁定')) showToast('失败次数过多，已被锁定15分钟', true);
            else showToast(e.message || '密码错误', true);
            adminPassword = '';
        } finally {
            btn.innerText = original;
            btn.disabled = false;
        }
    });

    document.getElementById('userTabBtn').addEventListener('click', () => {
        document.getElementById('userPanel').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('userTabBtn').classList.add('active');
    });
    document.getElementById('adminTabBtn').addEventListener('click', () => {
        document.getElementById('userPanel').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('adminTabBtn').classList.add('active');
        if (adminPassword) {
            loadQuestionList().catch(() => {});
        }
    });

    document.getElementById('verifyBtn').addEventListener('click', userVerify);
    document.getElementById('queryTokenBtn').addEventListener('click', loadAllTokens);
    document.getElementById('refreshDataBtn').addEventListener('click', loadAllTokens);
    document.getElementById('addTokenBtn').addEventListener('click', addSingleToken);
    document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelectedTokens);
    document.getElementById('clearAllBtn').addEventListener('click', clearAllTokens);
    document.getElementById('filterRemainBtn').addEventListener('click', filterByRemain);
    document.getElementById('clearFilterBtn').addEventListener('click', clearFilter);
    document.getElementById('clearLogsBtn').addEventListener('click', clearLogs);
    document.getElementById('toggleImportBtn').addEventListener('click', () => {
        document.getElementById('importPanel').classList.toggle('show');
    });
    document.getElementById('confirmImportBtn').addEventListener('click', importTokens);
    document.getElementById('copyEmergencyBtn').addEventListener('click', () => {
        const code = document.getElementById('emergencyCodeBlock').innerText;
        if (code && !code.includes('失败')) copyToClipboard(code, document.getElementById('copyEmergencyBtn'));
        else showToast('应急代码不可用', true);
    });
    document.getElementById('questionStatsBtn').addEventListener('click', showQuestionStatsModal);
    document.getElementById('clearQuestionsBtn').addEventListener('click', clearAllQuestions);
    document.getElementById('importExcelBtn').addEventListener('click', importExcel);
    document.getElementById('questionSearchBtn').addEventListener('click', searchQuestions);
    document.getElementById('questionResetBtn').addEventListener('click', resetQuestionSearch);
    document.getElementById('cancelImportBtn')?.addEventListener('click', () => {
        document.getElementById('excelConfigModal').style.display = 'none';
    });
    document.getElementById('confirmImportConfigBtn')?.addEventListener('click', confirmImportFromExcel);
    document.getElementById('cancelEditBtn')?.addEventListener('click', closeEditModal);
    document.getElementById('saveEditBtn')?.addEventListener('click', saveEdit);
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('editQuestionModal');
        if (e.target === modal) closeEditModal();
    });
</script>
